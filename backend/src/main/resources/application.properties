spring.datasource.url=jdbc:postgresql://localhost:5432/petshop_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# =======================================================
# CONFIGURACION DE HIBERNATE / JPA
# =======================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 'update' valida la consistencia de tus clases Java con las tablas de PostgreSQL
spring.jpa.hibernate.ddl-auto=update

# Muestra y formatea las consultas SQL en la consola para depuracion
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =======================================================
# INICIALIZACION DE DATOS (DATA.SQL)
# =======================================================
# 1. Obliga a Spring Boot a esperar que Hibernate valide o cree las tablas primero
spring.jpa.defer-datasource-initialization=true

# 2. Le indica el nombre exacto de tu archivo con los inserts iniciales
spring.sql.init.data-locations=classpath:Insert_Base.sql

# 3. Se mantiene en 'never' porque los datos ya existen en tu PostgreSQL
spring.sql.init.mode=never